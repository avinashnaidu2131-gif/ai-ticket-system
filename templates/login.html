{% extends "base.html" %}
{% block title %}Login · SupportAI{% endblock %}

{% block head %}
<style>
  body { overflow: hidden; }
  .auth-wrap {
    position: relative; z-index: 10;
    min-height: 100vh; display: grid; place-items: center;
  }
  .auth-box {
    width: 100%; max-width: 400px; padding: 2.5rem;
    background: rgba(10,10,15,0.85);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 32px 80px rgba(0,0,0,0.8);
    animation: fadeUp .5s ease;
  }
  .auth-logo {
    font-family: var(--font-head); font-size: 1.7rem; font-weight: 800;
    letter-spacing: -0.03em; color: var(--accent); margin-bottom: 0.25rem;
  }
  .auth-logo span { color: var(--text); }
  .auth-sub { color: var(--muted); font-size: 0.82rem; margin-bottom: 2rem; }
  .auth-footer { margin-top: 1.5rem; text-align: center; font-size: 0.8rem; color: var(--muted); }
  .auth-footer a { color: var(--accent); text-decoration: none; }
  .divider { border: none; border-top: 1px solid rgba(255,255,255,0.05); margin: 1.5rem 0; }
  input { background: rgba(255,255,255,0.04) !important; border: 1px solid rgba(255,255,255,0.08) !important; }
  input:focus { border-color: rgba(232,255,71,0.5) !important; background: rgba(255,255,255,0.06) !important; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">◈ Support<span>AI</span></div>
    <p class="auth-sub">Sign in to your workspace</p>
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="your_username" required autofocus />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem;">
        Sign In →
      </button>
    </form>
    <hr class="divider" />
    <p class="auth-footer">No account? <a href="/register">Create workspace</a></p>
  </div>
</div>
{% endblock %}
